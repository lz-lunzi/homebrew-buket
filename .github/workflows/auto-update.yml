name: Auto Update Formulae and Casks

on:
  schedule:
    # Every 3 days at China time 09:00 (UTC 01:00)
    - cron: '0 1 1,4,7,10,13,16,19,22,25,28 * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  bump:
    runs-on: macos-14
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Homebrew
        uses: Homebrew/actions/setup-homebrew@main

      - name: Configure Git
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'

      - name: Auto-bump packages
        uses: Homebrew/actions/bump-packages@main
        with:
          token: ${{ secrets.HOMEBREW_GITHUB_API_TOKEN }}
          formulae: >
            codebuddy-code
            iflow-cli
            octopus
          casks: >
            quotio
            flclash
            github-store
            xterminal
            z-code
            codebuddy
            codebuddy-cn
            qodercli
            zenflow
        continue-on-error: true
